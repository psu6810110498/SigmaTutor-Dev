name: Deploy Database Schema

on:
  push:
    branches: ['main']
    paths:
      - 'packages/db/prisma/**' # Only run when schema changes
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  db-migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v2
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install PostgreSQL client
        run: sudo apt-get install -y postgresql-client

      - name: Wake up Neon database (pooler auto-resumes compute)
        run: |
          # Neon free tier suspends compute when idle.
          # The pooler URL handles auto-resume — ping it first so the
          # direct URL connection doesn't timeout during cold start.
          until psql "$DATABASE_URL" -c "SELECT 1" > /dev/null 2>&1; do
            echo "Waiting for Neon compute to wake up..."
            sleep 3
          done
          echo "Neon database is ready."
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Resolve failed migrations (if any)
        run: |
          cd packages/db
          # Mark previously failed migration as rolled-back so Prisma can retry it cleanly.
          # Uses || true so this step won't fail if no migration is in failed state.
          pnpm prisma migrate resolve --rolled-back 20260228112746_check_lost_field_in_user_and_course || true
        env:
          # Neon: migrations must use the DIRECT (non-pooled) URL
          DATABASE_URL: ${{ secrets.DIRECT_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}

      - name: Run Prisma Migrations
        run: pnpm --filter @sigma/db db:migrate:deploy
        env:
          # Neon: migrations must use the DIRECT (non-pooled) URL
          DATABASE_URL: ${{ secrets.DIRECT_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
