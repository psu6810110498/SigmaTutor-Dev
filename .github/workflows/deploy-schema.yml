name: Deploy Database Schema

on:
  push:
    branches: ['main']
    paths:
      - 'packages/db/prisma/**' # Only run when schema changes
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  db-migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v2
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve failed migrations (if any)
        run: |
          cd packages/db
          # Retry up to 5 times to handle Neon cold start / auto-resume delay
          for i in {1..5}; do
            pnpm prisma migrate resolve --rolled-back 20260228112746_check_lost_field_in_user_and_course && break || true
            echo "Attempt $i failed, retrying in 5s..."
            sleep 5
          done
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DATABASE_URL }}

      - name: Run Prisma Migrations
        run: |
          # Retry up to 5 times to handle Neon cold start / auto-resume delay
          for i in {1..5}; do
            pnpm --filter @sigma/db db:migrate:deploy && break
            echo "Attempt $i failed, retrying in 5s..."
            sleep 5
          done
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DATABASE_URL }}
