name: Deploy Database Schema

on:
  push:
    branches: ['main']
    paths:
      - 'packages/db/prisma/**' # Only run when schema changes
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  db-migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v2
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve failed migrations (if any)
        run: |
          cd packages/db
          # Mark previously failed migration as rolled-back so Prisma can retry it cleanly.
          # Uses || true so this step won't fail if no migration is in failed state.
          pnpm prisma migrate resolve --rolled-back 20260228112746_check_lost_field_in_user_and_course || true
        env:
          # Neon: migrations must use the DIRECT (non-pooled) URL
          DATABASE_URL: ${{ secrets.DIRECT_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}

      - name: Run Prisma Migrations
        run: pnpm --filter @sigma/db db:migrate:deploy
        env:
          # Neon: migrations must use the DIRECT (non-pooled) URL
          DATABASE_URL: ${{ secrets.DIRECT_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
