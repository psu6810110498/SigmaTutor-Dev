name: Deploy Database Schema

on:
  push:
    branches: ['main']
    paths:
      - 'packages/db/prisma/**' # Only run when schema changes
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  db-migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v2
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve any previously failed migrations
        working-directory: packages/db
        run: |
          npx prisma migrate resolve --rolled-back 20260306144805_add_site_content || true
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DATABASE_URL }}

      - name: Run Prisma Migrations
        run: pnpm --filter @sigma/db db:migrate:deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DATABASE_URL }}
