services:
  # Redis — Rate limiting & Caching store
  redis:
    image: redis:7-alpine
    container_name: sigma-redis
    restart: unless-stopped
    ports:
      - '6380:6379'
    volumes:
      - redis_data:/data
    networks:
      - sigma-network
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: sigma-postgres
    restart: unless-stopped
    ports:
      - '5434:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: sigma_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - sigma-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend - Express
  backend:
    build:
      context: .
      dockerfile: ./apps/backend/Dockerfile
    container_name: sigma-backend
    restart: unless-stopped
    ports:
      - '4000:4000'
    environment:
      - NODE_ENV=development
      - PORT=4000
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/sigma_db?schema=public
      - JWT_SECRET=docker-jwt-secret-change-in-production
      - JWT_REFRESH_SECRET=docker-refresh-secret-change-in-production
      - JWT_EXPIRES_IN=15m
      - JWT_REFRESH_EXPIRES_IN=7d
      - CORS_ORIGIN=http://localhost:3000
      - REDIS_URL=redis://redis:6379
    volumes:
      - ./:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sigma-network

  # Frontend - Next.js
  frontend:
    build:
      context: .
      dockerfile: ./apps/frontend/Dockerfile
    container_name: sigma-frontend
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost:4000
    volumes:
      - ./:/app
      - /app/node_modules
      - ./apps/frontend/.next:/app/.next
    depends_on:
      - backend
    networks:
      - sigma-network

volumes:
  postgres_data:
  redis_data:

networks:
  sigma-network:
    driver: bridge
