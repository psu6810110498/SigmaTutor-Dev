services:
  redis:
    image: redis:7-alpine
    container_name: sigma-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - sigma-network
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: ./apps/backend/Dockerfile
    container_name: sigma-backend
    restart: unless-stopped
    ports:
      - '${BACKEND_PORT:-4000}:4000'
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL}
      DIRECT_URL: ${DIRECT_URL:-${DATABASE_URL}}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?set JWT_REFRESH_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      CORS_ORIGIN: ${CORS_ORIGIN:?set CORS_ORIGIN}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_ENDPOINT: ${R2_ENDPOINT:-}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME:-}
      Gumlet API_KEY: ${GUMLET_API_KEY:-}
      GUMLET_COLLECTION_ID: ${GUMLET_COLLECTION_ID:-}
    command: >
      sh -c "cd /app &&
      pnpm --filter @sigma/shared build &&
      pnpm --filter @sigma/backend build &&
      pnpm --filter @sigma/db db:migrate:deploy &&
      cd /app/apps/backend &&
      pnpm start"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - sigma-network
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:4000/health >/dev/null 2>&1 || exit 1']
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: .
      dockerfile: ./apps/frontend/Dockerfile
    container_name: sigma-frontend
    restart: unless-stopped
    ports:
      - '${FRONTEND_PORT:-80}:3000'
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?set NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY:-}
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID:-}
    command: >
      sh -c "cd /app &&
      pnpm --filter @sigma/shared build &&
      pnpm --filter @sigma/frontend build &&
      cd /app/apps/frontend &&
      pnpm start"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - sigma-network
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000 >/dev/null 2>&1 || exit 1']
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  redis_data:

networks:
  sigma-network:
    driver: bridge
